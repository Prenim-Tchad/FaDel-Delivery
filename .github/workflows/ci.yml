name: FaDel Auth CI

on:
  push:
    branches: [ main, developp ]
  pull_request:
    branches: [ main, developp ]

jobs:
  check-build:
    runs-on: ubuntu-latest

    services:
      # On lance un Postgres temporaire pour que Prisma puisse valider le schéma
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fadel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fadel_test

      - name: Build Project
        run: npm run build
        env:
          # On passe des variables fictives juste pour le build
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fadel_test
          JWT_SECRET: dummy_secret_for_ci
          FIREBASE_SERVICE_ACCOUNT_PATH: ./firebase-adminsdk.json

      - name: Lint Check
        run: npm run lint