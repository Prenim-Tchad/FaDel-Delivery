name: FaDel Auth CI

on:
  push:
    branches: [ main, developp ]
  pull_request:
    branches: [ main, developp ]

jobs:
  check-build:
    runs-on: ubuntu-latest

    services:
      # On lance un Postgres temporaire pour que Prisma puisse valider le schéma
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: fadel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fadel_test

      - name: Sync Database Schema (Prisma Push)
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fadel_test

      - name: Lint Check
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fadel_test
          JWT_SECRET: dummy_secret_fadel_2026
          # Variables Supabase indispensables pour ton module Auth
          SUPABASE_URL: https://placeholder-project.supabase.co
          SUPABASE_ANON_KEY: dummy_key_for_ci_checks
          SUPABASE_SERVICE_ROLE_KEY: dummy_admin_key

      - name: Build Project
        run: npm run build
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/fadel_test
          JWT_SECRET: dummy_secret_fadel_2026
          SUPABASE_URL: https://placeholder-project.supabase.co
          SUPABASE_ANON_KEY: dummy_key_for_ci_checks
          SUPABASE_SERVICE_ROLE_KEY: dummy_admin_key